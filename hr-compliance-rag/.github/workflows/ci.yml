name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Fast tests (unit + mocked integration)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      MOCK_LLM: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies (ci-requirements)
        run: |
          python -m pip install --upgrade pip
          if [ -f ci-requirements.txt ]; then pip install -r ci-requirements.txt; fi
      - name: Run tests
        run: pytest -q

  integration:
    name: Full integration (heavy deps)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Restore pip cache (backup)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install full requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install --prefer-binary --progress-bar off -r requirements.txt; fi
          # Ensure test tools are available in the integration job
          if [ -f ci-requirements.txt ]; then pip install --prefer-binary --progress-bar off -r ci-requirements.txt; fi
      - name: Run full test suite
        run: pytest -q
